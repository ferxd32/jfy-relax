<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JFY Relax - Gestión de Clientes y Finanzas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        /* ESTILOS GENERALES (Estilo Negro y Dorado Elegante) */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
        }

        /* ENCABEZADO */
        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .header h1 {
            color: #cca43b;
            font-size: 28px;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .header p {
            color: #777777;
            font-size: 13px;
            margin: 5px 0 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* PANELES DE NAVEGACIÓN (TABS) */
        .tabs-container {
            display: flex;
            background-color: #141414;
            padding: 6px;
            border-radius: 12px;
            border: 1px solid #222222;
            margin-bottom: 25px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #aaaaaa;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .tab-button.active {
            background-color: #cca43b;
            color: #0a0a0a;
        }

        /* SECCIONES */
        .section-view {
            display: none;
        }

        .section-view.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #cca43b;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .btn-action-small {
            background-color: #141414;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action-small:hover {
            border-color: #cca43b;
            color: #cca43b;
        }

        /* TARJETAS DE RESUMEN RÁPIDO */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
