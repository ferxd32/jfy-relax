<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JFY RELAX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#334155;
  --text:#f8fafc;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --blue:#38bdf8;--blue-bg:rgba(56,189,248,0.15);
  --green:#4ade80;--green-bg:rgba(74,222,128,0.15);
  --purple:#c084fc;--purple-bg:rgba(192,132,252,0.15);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.15);
  --pink:#f472b6;--pink-bg:rgba(244,114,182,0.15);
  --red:#f87171;--red-bg:rgba(248,113,113,0.15);
  --radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;max-width:520px;margin:0 auto;padding-bottom:40px}
.sync{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;font-size:12px;font-weight:600}
.sync.ok{color:var(--green);background:var(--green-bg)}
.sync.wait{color:var(--amber);background:var(--amber-bg)}
.sync.err{color:var(--red);background:var(--red-bg)}
.header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:800}
.hbtns{display:flex;gap:8px}
.hbtn{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text2);font-size:12px;cursor:pointer}
.nav{margin:10px 16px;display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--card);padding:4px;border-radius:var(--radius);border:1px solid var(--border)}
.nav button{padding:10px;border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;border-radius:8px}
.nav button.on{background:var(--card2);color:var(--text)}
.tabs-scroll{padding:10px 16px 0;overflow-x:auto}
.tabs-scroll::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:6px;width:max-content}
.tab{padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--blue-bg);color:var(--blue);border-color:transparent;font-weight:700}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px 0}
.stat{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}
.stat.w2{grid-column:span 2}
.slabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.sval{font-size:24px;font-weight:800}
.card{margin:14px 16px 0;background:var(--card);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.card h2{font-size:14px;font-weight:700;margin-bottom:14px}
.lbl{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;margin-top:10px}
.lbl:first-child{margin-top:0}
input,select{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--blue)}
.monto-show{color:var(--amber);font-weight:700;background:#1a1500;border-color:var(--amber-bg)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;margin-top:12px;padding:13px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;background:var(--blue-bg);color:var(--blue)}
.btn.g{background:var(--green-bg);color:var(--green)}
.err{font-size:12px;color:var(--red);margin-top:6px;display:none;padding:6px 10px;background:var(--red-bg);border-radius:8px}
.list{padding:14px 16px 0}
.ltitle{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
.empty{text-align:center;padding:40px 0;color:var(--text3);font-size:14px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border)}
.item{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.inum{width:26px;height:26px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text2);flex-shrink:0}
.iinfo{flex:1;min-width:0}
.iname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b15{background:var(--amber-bg);color:var(--amber)}
.b30{background:var(--blue-bg);color:var(--blue)}
.b60{background:var(--pink-bg);color:var(--pink)}
.bYape{background:var(--purple-bg);color:var(--purple)}
.bEfectivo{background:var(--green-bg);color:var(--green)}
.begr{background:var(--red-bg);color:var(--red)}
.imonto{font-size:15px;font-weight:700;flex-shrink:0}
.imonto.neg{color:var(--red)}
.ibtn{background:transparent;border:none;padding:6px;color:var(--text3);cursor:pointer;font-size:16px;border-radius:8px}
.ibtn:hover{background:var(--red-bg);color:var(--red)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0 0 24px;display:none}
.modal{background:var(--card);border-radius:var(--radius);width:calc(100% - 32px);max-width:488px;padding:20px;border:1px solid var(--border2)}
.modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--text2);margin-bottom:18px}
.mbtn{width:100%;padding:13px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px}
.mbtn.amber{background:var(--amber-bg);color:var(--amber)}
.mbtn.red{background:var(--red-bg);color:var(--red)}
.mbtn.gray{background:var(--card2);color:var(--text2)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;transition:transform 0.3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="sync wait" id="sync">⏳ Conectando…</div>

<div class="header">
  <h1>JFY RELAX</h1>
  <div class="hbtns">
    <button class="hbtn" onclick="exportar()">📥 Exportar</button>
    <button class="hbtn" onclick="abrirReset()">🔄 Reiniciar</button>
  </div>
</div>

<div class="nav">
  <button id="btnClientes" class="on" onclick="verClientes()">👥 Clientes</button>
  <button id="btnFinanzas" onclick="verFinanzas()">💰 Finanzas</button>
</div>

<!-- CLIENTES -->
<div id="viewClientes">
  <div class="tabs-scroll"><div class="tabs" id="tabs"></div></div>
  <div class="stats" id="statsDay" style="display:none"></div>
  <div class="card">
    <h2>Agregar Cliente</h2>
    <label class="lbl">Nombre</label>
    <input type="text" id="inpNombre" placeholder="Nombre del cliente" autocomplete="off">
    <div class="row2">
      <div>
        <label class="lbl">Tiempo</label>
        <select id="inpTiempo" onchange="actualizarMonto()">
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="60">60 min</option>
        </select>
      </div>
      <div>
        <label class="lbl">Pago</label>
        <select id="inpPago">
          <option value="Yape">Yape</option>
          <option value="Efectivo">Efectivo</option>
        </select>
      </div>
    </div>
    <label class="lbl">Monto (automático)</label>
    <input type="text" id="inpMonto" class="monto-show" readonly>
    <button class="btn" onclick="agregarCliente()">+ Agregar Cliente</button>
    <div class="err" id="errCliente">Escribe el nombre del cliente.</div>
  </div>
  <div class="list">
    <div class="ltitle" id="ltitleClientes"></div>
    <div id="listClientes"></div>
  </div>
</div>

<!-- FINANZAS -->
<div id="viewFinanzas" style="display:none">
  <div class="stats" id="statsGlobal" style="padding-top:14px"></div>
  <div class="card">
    <h2>Registrar Egreso</h2>
    <label class="lbl">Descripción</label>
    <input type="text" id="inpEgresoDesc" placeholder="Ej: productos, transporte…">
    <label class="lbl">Categoría</label>
    <select id="inpEgresoCat">
      <option value="Insumos">Insumos</option>
      <option value="Servicios">Servicios</option>
      <option value="Otros">Otros</option>
    </select>
    <label class="lbl">Monto (S/)</label>
    <input type="number" id="inpEgresoMonto" placeholder="0.00" step="0.5">
    <button class="btn g" onclick="agregarEgreso()">+ Registrar Egreso</button>
    <div class="err" id="errEgreso">Completa descripción y monto.</div>
  </div>
  <div class="list">
    <div class="ltitle">Egresos de la semana</div>
    <div id="listEgresos"></div>
  </div>
</div>

<!-- MODAL RESET -->
<div class="overlay" id="overlay" onclick="if(event.target===this)cerrarReset()">
  <div class="modal">
    <h3>Reiniciar</h3>
    <p>¿Qué deseas borrar?</p>
    <button class="mbtn amber" id="btnBorrarDia" onclick="borrarDia()"></button>
    <button class="mbtn red" onclick="borrarTodo()">🗑️ Borrar todo (semana + egresos)</button>
    <button class="mbtn gray" onclick="cerrarReset()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SIN módulos, versión compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ── FIREBASE ──
firebase.initializeApp({
  apiKey:            "AIzaSyDjhH4fCBx9GER-FCBZ18tMQtzEeF8Qobo",
  authDomain:        "clientes-ingreosos-y-egresos.firebaseapp.com",
  projectId:         "clientes-ingreosos-y-egresos",
  storageBucket:     "clientes-ingreosos-y-egresos.firebasestorage.app",
  messagingSenderId: "486463620081",
  appId:             "1:486463620081:web:dd571ec8291a51c9553a50"
});
var db  = firebase.firestore();
var DOC = db.collection("jfy_relax_app").doc("semana_actual");

// ── DATOS ──
var PRECIOS = { '15': 10, '30': 20, '60': 30 };
var DAYS    = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
var clientes = {};
DAYS.forEach(function(d){ clientes[d] = []; });
var egresos = [];
var diaActual = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

// ── MONTO AUTOMÁTICO ──
function actualizarMonto() {
  var t = document.getElementById('inpTiempo').value;
  document.getElementById('inpMonto').value = 'S/ ' + PRECIOS[t].toFixed(2);
}
actualizarMonto();

// ── VISTAS ──
function verClientes() {
  document.getElementById('viewClientes').style.display = 'block';
  document.getElementById('viewFinanzas').style.display = 'none';
  document.getElementById('btnClientes').classList.add('on');
  document.getElementById('btnFinanzas').classList.remove('on');
}
function verFinanzas() {
  document.getElementById('viewClientes').style.display = 'none';
  document.getElementById('viewFinanzas').style.display = 'block';
  document.getElementById('btnFinanzas').classList.add('on');
  document.getElementById('btnClientes').classList.remove('on');
  renderFinanzas();
}

// ── TOAST ──
var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

// ── GUARDAR ──
function guardar() {
  DOC.set({ clientes: clientes, egresos: egresos })
    .catch(function(e){ console.error(e); toast('⚠️ Error al guardar'); });
}

// ── ESCUCHAR FIRESTORE ──
DOC.onSnapshot(function(snap) {
  document.getElementById('sync').className = 'sync ok';
  document.getElementById('sync').textContent = '● Sincronizado';
  if (snap.exists) {
    var d = snap.data();
    DAYS.forEach(function(day){
      clientes[day] = (d.clientes && Array.isArray(d.clientes[day])) ? d.clientes[day] : [];
    });
    egresos = Array.isArray(d.egresos) ? d.egresos : [];
  } else {
    DAYS.forEach(function(d){ clientes[d] = []; });
    egresos = [];
  }
  renderClientes();
  renderFinanzas();
}, function(err) {
  document.getElementById('sync').className = 'sync err';
  document.getElementById('sync').textContent = '✕ Sin conexión';
  console.error(err);
});

// ── RENDER CLIENTES ──
function renderClientes() {
  // Tabs
  var tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = DAYS.map(function(d){
    return '<button class="tab' + (d===diaActual?' on':'') + '" onclick="cambiarDia(\'' + d + '\')">' +
      d + (clientes[d].length ? ' <span style="opacity:.6;font-size:11px">'+clientes[d].length+'</span>' : '') +
    '</button>';
  }).join('');

  // Stats del día
  var list = clientes[diaActual] || [];
  var statsEl = document.getElementById('statsDay');
  if (list.length) {
    statsEl.style.display = 'grid';
    var total = list.reduce(function(a,c){ return a+Number(c.monto); }, 0);
    var yape  = list.filter(function(c){ return c.pago==='Yape'; }).reduce(function(a,c){ return a+Number(c.monto); }, 0);
    var efec  = list.filter(function(c){ return c.pago==='Efectivo'; }).reduce(function(a,c){ return a+Number(c.monto); }, 0);
    statsEl.innerHTML =
      '<div class="stat w2"><div class="slabel">Recaudado — '+diaActual+'</div><div class="sval" style="color:var(--amber)">S/ '+total.toFixed(2)+'</div></div>' +
      '<div class="stat"><div class="slabel">Yape</div><div class="sval" style="color:var(--purple)">S/ '+yape.toFixed(2)+'</div></div>' +
      '<div class="stat"><div class="slabel">Efectivo</div><div class="sval" style="color:var(--green)">S/ '+efec.toFixed(2)+'</div></div>';
  } else {
    statsEl.style.display = 'none';
  }

  // Lista
  document.getElementById('ltitleClientes').textContent = 'Clientes del ' + diaActual + ' (' + list.length + ')';
  var listEl = document.getElementById('listClientes');
  if (!list.length) {
    listEl.innerHTML = '<div class="empty">Sin clientes el ' + diaActual + '</div>';
    return;
  }
  listEl.innerHTML = list.map(function(c, i){
    return '<div class="item">' +
      '<div class="inum">'+(i+1)+'</div>' +
      '<div class="iinfo">' +
        '<div class="iname">'+esc(c.nombre)+'</div>' +
        '<div class="imeta">' +
          '<span class="badge b'+c.tiempo+'">'+c.tiempo+' min</span>' +
          '<span class="badge b'+c.pago+'">'+esc(c.pago)+'</span>' +
        '</div>' +
      '</div>' +
      '<div class="imonto">S/ '+Number(c.monto).toFixed(2)+'</div>' +
      '<button class="ibtn" onclick="eliminarCliente('+i+')">✕</button>' +
    '</div>';
  }).join('');
}

// ── RENDER FINANZAS ──
function renderFinanzas() {
  var totalI = 0;
  DAYS.forEach(function(d){ totalI += (clientes[d]||[]).reduce(function(a,c){ return a+Number(c.monto); }, 0); });
  var totalE = egresos.reduce(function(a,e){ return a+Number(e.monto); }, 0);
  var balance = totalI - totalE;

  document.getElementById('statsGlobal').innerHTML =
    '<div class="stat w2"><div class="slabel">Balance Neto</div><div class="sval" style="color:' + (balance>=0?'var(--green)':'var(--red)') + '">S/ '+balance.toFixed(2)+'</div></div>' +
    '<div class="stat"><div class="slabel">Ingresos</div><div class="sval" style="color:var(--blue)">S/ '+totalI.toFixed(2)+'</div></div>' +
    '<div class="stat"><div class="slabel">Gastos</div><div class="sval" style="color:var(--red)">S/ '+totalE.toFixed(2)+'</div></div>';

  var listEl = document.getElementById('listEgresos');
  if (!egresos.length) {
    listEl.innerHTML = '<div class="empty">No hay egresos registrados</div>';
    return;
  }
  listEl.innerHTML = egresos.map(function(e, i){
    return '<div class="item">' +
      '<div class="inum">'+(i+1)+'</div>' +
      '<div class="iinfo">' +
        '<div class="iname">'+esc(e.desc)+'</div>' +
        '<div class="imeta"><span class="badge begr">'+esc(e.cat)+'</span></div>' +
      '</div>' +
      '<div class="imonto neg">− S/ '+Number(e.monto).toFixed(2)+'</div>' +
      '<button class="ibtn" onclick="eliminarEgreso('+i+')">✕</button>' +
    '</div>';
  }).join('');
}

// ── CAMBIAR DÍA ──
function cambiarDia(dia) {
  diaActual = dia;
  renderClientes();
}

// ── AGREGAR CLIENTE ──
function agregarCliente() {
  var nombre = document.getElementById('inpNombre').value.trim();
  var errEl  = document.getElementById('errCliente');
  if (!nombre) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  var tiempo = document.getElementById('inpTiempo').value;
  clientes[diaActual].push({
    nombre: nombre,
    tiempo: tiempo,
    pago:   document.getElementById('inpPago').value,
    monto:  PRECIOS[tiempo]
  });
  guardar();
  document.getElementById('inpNombre').value = '';
  toast('✅ Cliente agregado');
}

// ── ELIMINAR CLIENTE ──
function eliminarCliente(i) {
  clientes[diaActual].splice(i, 1);
  guardar();
  toast('🗑️ Eliminado');
}

// ── AGREGAR EGRESO ──
function agregarEgreso() {
  var desc   = document.getElementById('inpEgresoDesc').value.trim();
  var monto  = parseFloat(document.getElementById('inpEgresoMonto').value);
  var errEl  = document.getElementById('errEgreso');
  if (!desc || isNaN(monto) || monto <= 0) { errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  egresos.push({ desc: desc, cat: document.getElementById('inpEgresoCat').value, monto: monto });
  guardar();
  document.getElementById('inpEgresoDesc').value  = '';
  document.getElementById('inpEgresoMonto').value = '';
  toast('✅ Egreso registrado');
}

// ── ELIMINAR EGRESO ──
function eliminarEgreso(i) {
  egresos.splice(i, 1);
  guardar();
  toast('🗑️ Eliminado');
}

// ── RESET ──
function abrirReset() {
  document.getElementById('btnBorrarDia').textContent = '🗓️ Borrar clientes del ' + diaActual;
  document.getElementById('overlay').style.display = 'flex';
}
function cerrarReset() {
  document.getElementById('overlay').style.display = 'none';
}
function borrarDia() {
  clientes[diaActual] = [];
  guardar();
  cerrarReset();
  toast('🗑️ Clientes del ' + diaActual + ' borrados');
}
function borrarTodo() {
  DAYS.forEach(function(d){ clientes[d] = []; });
  egresos = [];
  guardar();
  cerrarReset();
  toast('🗑️ Todo borrado');
}

// ── EXPORTAR ──
function exportar() {
  var csv = 'Dia,Nombre,Tiempo,Pago,Monto\n';
  DAYS.forEach(function(d){
    (clientes[d]||[]).forEach(function(c){
      csv += '"'+d+'","'+c.nombre+'","'+c.tiempo+' min","'+c.pago+'","'+c.monto+'"\n';
    });
  });
  csv += '\nDescripcion,Categoria,Monto\n';
  egresos.forEach(function(e){ csv += '"'+e.desc+'","'+e.cat+'","'+e.monto+'"\n'; });
  var totalI = 0;
  DAYS.forEach(function(d){ totalI += (clientes[d]||[]).reduce(function(a,c){ return a+Number(c.monto); }, 0); });
  var totalE = egresos.reduce(function(a,e){ return a+Number(e.monto); }, 0);
  csv += '\nIngresos,'+totalI.toFixed(2)+'\nEgresos,'+totalE.toFixed(2)+'\nGanancia,'+(totalI-totalE).toFixed(2)+'\n';
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'JFY_Relax_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('📥 Exportado');
}

// ── ESCAPE HTML ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
