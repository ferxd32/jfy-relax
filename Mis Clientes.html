<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Clientes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--card:#ffffff;--card2:#f0efed;
  --text:#1a1a18;--text2:#6b6b67;--text3:#a0a09c;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --blue:#0c447c;--blue-bg:#e6f1fb;
  --green:#0f6e56;--green-bg:#e1f5ee;
  --purple:#4a2fa3;--purple-bg:#ece8fb;
  --amber:#7a4800;--amber-bg:#fef0d0;
  --pink:#72243e;--pink-bg:#fbeaf0;
  --red:#a32d2d;--red-bg:#fcebeb;
  --radius:10px;--radius-lg:14px;
}
html,body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
body{max-width:520px;margin:0 auto;padding-bottom:32px}

/* Header */
.header{padding:18px 16px 0;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.hbtns{display:flex;gap:8px}
.hbtn{background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 11px;color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}

/* Tabs */
.tabs-wrap{padding:14px 16px 0;overflow-x:auto}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:6px;width:max-content}
.tab{padding:7px 14px;border:0.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--blue-bg);color:var(--blue);border-color:transparent;font-weight:600}
.cnt{font-size:11px;opacity:.55;margin-left:2px}

/* Stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px 0}
.stat{background:var(--card);border-radius:var(--radius);padding:12px 14px}
.stat.wide{grid-column:span 2}
.slabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.sval{font-size:22px;font-weight:700}
.ssub{font-size:11px;color:var(--text3);margin-top:2px}

/* Form */
.form-card{margin:14px 16px 0;background:var(--card);border-radius:var(--radius-lg);padding:14px}
.form-card h2{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:12px}
.field{margin-bottom:10px}
.field label{font-size:12px;color:var(--text3);display:block;margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:15px;-webkit-appearance:none;appearance:none;outline:none}
.field input:focus,.field select:focus{border-color:var(--blue)}
.sel-wrap{position:relative}
.sel-wrap select{padding-right:28px}
.sel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);pointer-events:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-add{width:100%;margin-top:4px;padding:12px;background:var(--blue-bg);color:var(--blue);border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer}
.btn-add:active{opacity:.75}
.err{font-size:12px;color:var(--red);margin-top:6px;display:none}

/* List */
.list-wrap{padding:14px 16px 0}
.list-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:10px}
.empty{text-align:center;padding:36px 0;color:var(--text3);font-size:14px;background:var(--card);border-radius:var(--radius-lg)}
.item{background:var(--card);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.inum{width:26px;height:26px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0}
.iinfo{flex:1;min-width:0}
.iname{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-15{background:var(--amber-bg);color:var(--amber)}
.b-30{background:var(--blue-bg);color:var(--blue)}
.b-60{background:var(--pink-bg);color:var(--pink)}
.b-Yape{background:var(--purple-bg);color:var(--purple)}
.b-Efectivo{background:var(--green-bg);color:var(--green)}
.imonto{font-size:15px;font-weight:700;flex-shrink:0}
.ibtn{background:transparent;border:none;padding:6px;color:var(--text3);cursor:pointer;font-size:16px;border-radius:8px;line-height:1}
.ibtn:active{background:var(--red-bg);color:var(--red)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0 0 24px}
.overlay.hidden{display:none}
.modal{background:var(--card);border-radius:var(--radius-lg);width:calc(100% - 32px);max-width:488px;padding:20px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:6px}
.modal p{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.4}
.modal-btns{display:flex;flex-direction:column;gap:8px}
.mbtn{width:100%;padding:13px;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.mbtn-day{background:var(--amber-bg);color:var(--amber)}
.mbtn-week{background:var(--red-bg);color:var(--red)}
.mbtn-cancel{background:var(--card2);color:var(--text2)}
</style>
</head>
<body>

<div class="header">
  <h1>Mis Clientes</h1>
  <div class="hbtns">
    <button class="hbtn" id="btn-export">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar
    </button>
    <button class="hbtn" id="btn-reset">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      Reiniciar
    </button>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="stats" id="stats" style="display:none"></div>

<div class="form-card">
  <h2>Agregar cliente</h2>
  <div class="field">
    <label>Nombre</label>
    <input type="text" id="inp-nombre" placeholder="Ej: María García" autocomplete="off">
  </div>
  <div class="row2">
    <div class="field">
      <label>Tiempo</label>
      <div class="sel-wrap">
        <select id="inp-tiempo">
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="60">60 min</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Pago</label>
      <div class="sel-wrap">
        <select id="inp-pago">
          <option value="Yape">Yape</option>
          <option value="Efectivo">Efectivo</option>
        </select>
      </div>
    </div>
  </div>
  <div class="field">
    <label>Monto (S/)</label>
    <input type="number" id="inp-monto" placeholder="0.00" min="0" step="0.5" inputmode="decimal">
  </div>
  <button class="btn-add" id="btn-add">+ Agregar</button>
  <div class="err" id="err">Completa el nombre y el monto.</div>
</div>

<div class="list-wrap">
  <div class="list-title" id="list-title"></div>
  <div id="list"></div>
</div>

<!-- Modal reiniciar -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h3>Reiniciar</h3>
    <p>¿Qué deseas borrar?</p>
    <div class="modal-btns">
      <button class="mbtn mbtn-day" id="mbtn-day"></button>
      <button class="mbtn mbtn-week" id="mbtn-week">Borrar toda la semana</button>
      <button class="mbtn mbtn-cancel" id="mbtn-cancel">Cancelar</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let data = {};
try { const s = localStorage.getItem('mis_clientes'); if(s) data = JSON.parse(s); } catch(e){}
DAYS.forEach(d => { if(!Array.isArray(data[d])) data[d] = []; });

let day = DAYS[0];

function save() {
  try { localStorage.setItem('mis_clientes', JSON.stringify(data)); } catch(e){}
}

function render() {
  renderTabs();
  renderStats();
  renderList();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = DAYS.map(d =>
    `<button class="tab${d===day?' active':''}" data-day="${d}">
      ${d}<span class="cnt">${data[d].length||''}</span>
    </button>`
  ).join('');
}

function renderStats() {
  const el = document.getElementById('stats');
  const list = data[day];
  if(!list.length){ el.style.display='none'; return; }
  el.style.display='grid';
  const total = list.reduce((a,c)=>a+Number(c.monto),0);
  const yape  = list.filter(c=>c.pago==='Yape').reduce((a,c)=>a+Number(c.monto),0);
  const efec  = list.filter(c=>c.pago==='Efectivo').reduce((a,c)=>a+Number(c.monto),0);
  const mins  = list.reduce((a,c)=>a+Number(c.tiempo),0);
  el.innerHTML =
    `<div class="stat wide"><div class="slabel">Total recaudado</div><div class="sval">S/ ${total.toFixed(2)}</div><div class="ssub">${list.length} cliente${list.length!==1?'s':''} · ${mins} min</div></div>
     <div class="stat"><div class="slabel">Yape</div><div class="sval">S/ ${yape.toFixed(2)}</div><div class="ssub">${list.filter(c=>c.pago==='Yape').length} pago${list.filter(c=>c.pago==='Yape').length!==1?'s':''}</div></div>
     <div class="stat"><div class="slabel">Efectivo</div><div class="sval">S/ ${efec.toFixed(2)}</div><div class="ssub">${list.filter(c=>c.pago==='Efectivo').length} pago${list.filter(c=>c.pago==='Efectivo').length!==1?'s':''}</div></div>`;
}

function renderList() {
  const list = data[day];
  document.getElementById('list-title').textContent = `Clientes del ${day} (${list.length})`;
  document.getElementById('list').innerHTML = list.length
    ? list.map((c,i) =>
        `<div class="item">
          <div class="inum">${i+1}</div>
          <div class="iinfo">
            <div class="iname">${c.nombre}</div>
            <div class="imeta">
              <span class="badge b-${c.tiempo}">${c.tiempo} min</span>
              <span class="badge b-${c.pago}">${c.pago}</span>
            </div>
          </div>
          <div class="imonto">S/ ${Number(c.monto).toFixed(2)}</div>
          <button class="ibtn" data-del="${i}">✕</button>
        </div>`).join('')
    : `<div class="empty">Sin clientes aún<br><span style="font-size:12px;display:block;margin-top:4px">Agrega el primero arriba</span></div>`;
}

// Tabs click (delegado)
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-day]');
  if(btn){ day = btn.dataset.day; render(); }
});

// Borrar cliente (delegado)
document.getElementById('list').addEventListener('click', e => {
  const btn = e.target.closest('[data-del]');
  if(btn){
    data[day].splice(Number(btn.dataset.del), 1);
    save(); render();
  }
});

// Agregar
document.getElementById('btn-add').addEventListener('click', () => {
  const nombre = document.getElementById('inp-nombre').value.trim();
  const monto  = parseFloat(document.getElementById('inp-monto').value);
  const err    = document.getElementById('err');
  if(!nombre || !monto){ err.style.display='block'; return; }
  err.style.display='none';
  data[day].push({
    nombre,
    tiempo: document.getElementById('inp-tiempo').value,
    pago:   document.getElementById('inp-pago').value,
    monto
  });
  save();
  document.getElementById('inp-nombre').value='';
  document.getElementById('inp-monto').value='';
  document.getElementById('inp-nombre').focus();
  render();
});

// Enter para agregar
document.addEventListener('keydown', e => {
  if(e.key==='Enter' && e.target.closest('.form-card'))
    document.getElementById('btn-add').click();
});

// Reiniciar modal
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('mbtn-day').textContent = `Borrar solo el ${day}`;
  document.getElementById('overlay').classList.remove('hidden');
});
document.getElementById('mbtn-cancel').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
});
document.getElementById('mbtn-day').addEventListener('click', () => {
  data[day] = []; save(); render();
  document.getElementById('overlay').classList.add('hidden');
});
document.getElementById('mbtn-week').addEventListener('click', () => {
  DAYS.forEach(d => { data[d] = []; }); save(); render();
  document.getElementById('overlay').classList.add('hidden');
});
document.getElementById('overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.add('hidden');
});

// Exportar CSV
document.getElementById('btn-export').addEventListener('click', () => {
  let rows = [['Día','#','Nombre','Tiempo (min)','Pago','Monto (S/)']];
  DAYS.forEach(d => data[d].forEach((c,i) =>
    rows.push([d, i+1, c.nombre, c.tiempo, c.pago, Number(c.monto).toFixed(2)])
  ));
  const csv = rows.map(r => r.map(v=>`"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'clientes_semana.csv';
  a.click();
});

render();
</script>
</body>
</html>
