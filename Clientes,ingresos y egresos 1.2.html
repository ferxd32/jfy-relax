<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JFY Relax - Gestión de Clientes y Finanzas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        /* ESTILOS GENERALES (Estilo Negro y Dorado Elegante) */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
        }

        /* ENCABEZADO */
        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .header h1 {
            color: #cca43b;
            font-size: 28px;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .header p {
            color: #777777;
            font-size: 13px;
            margin: 5px 0 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* PANELES DE NAVEGACIÓN (TABS) */
        .tabs-container {
            display: flex;
            background-color: #141414;
            padding: 6px;
            border-radius: 12px;
            border: 1px solid #222222;
            margin-bottom: 25px;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #aaaaaa;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .tab-button.active {
            background-color: #cca43b;
            color: #0a0a0a;
        }

        /* SECCIONES */
        .section-view {
            display: none;
        }

        .section-view.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #cca43b;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .btn-action-small {
            background-color: #141414;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action-small:hover {
            border-color: #cca43b;
            color: #cca43b;
        }

        /* TARJETAS DE RESUMEN RÁPIDO */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-box {
            background-color: #141414;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 15px;
        }

        .summary-box .title {
            color: #666666;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .summary-box .amount {
            font-size: 22px;
            font-weight: 700;
        }

        .amount.income { color: #cca43b; }
        .amount.expense { color: #e57373; }

        /* TARJETA DE BALANCE DETALLADO */
        .balance-card {
            background-color: #141414;
            border: 1px solid #241f15;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #141414 0%, #1a160e 100%);
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: #aaaaaa;
        }

        .balance-row.total {
            margin-top: 18px;
            padding-top: 15px;
            border-top: 1px solid #332712;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .balance-row.total .amount {
            color: #cca43b;
            font-size: 18px;
        }

        /* FORMULARIOS Y TARJETAS DE REGISTRO */
        .form-card {
            background-color: #141414;
            border: 1px solid #222222;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 12px;
            color: #888888;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group.half-width {
            flex: 1;
        }

        .form-control {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #cca43b;
        }

        .form-control.gold-text {
            color: #cca43b;
            font-weight: 700;
        }

        .btn-submit {
            width: 100%;
            background-color: #cca43b;
            color: #0a0a0a;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }

        /* LISTADOS DE DATOS (CLIENTES) */
        .data-list {
            margin-top: 15px;
        }

        .date-group {
            margin-bottom: 15px;
        }

        .date-label {
            background-color: #332712;
            color: #cca43b;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .client-item {
            background-color: #141414;
            border: 1px solid #222222;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .client-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #332712;
            color: #cca43b;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        .client-info {
            flex: 1;
        }

        .client-name {
            font-weight: 600;
            font-size: 14px;
        }

        .client-meta {
            font-size: 12px;
            color: #777777;
            margin-top: 2px;
        }

        .badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        .badge-yape {
            background-color: #2a1f4a;
            color: #8c73e5;
        }

        .badge-cash {
            background-color: #222222;
            color: #aaaaaa;
        }

        .client-actions {
            text-align: right;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .client-amount {
            color: #cca43b;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #e57373;
            cursor: pointer;
            font-size: 12px;
        }

        /* LISTADOS DE DATOS (FINANZAS) */
        .data-item {
            background-color: #141414;
            border: 1px solid #222222;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .data-info .primary {
            font-weight: 600;
            font-size: 14px;
        }

        .data-info .secondary {
            font-size: 12px;
            color: #777777;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <h1>JFY RELAX</h1>
            <p>Gestión de Clientes</p>
        </div>

        <div class="tabs-container">
            <button class="tab-button active" id="tab-clientes" onclick="switchTab('clientes')">
                👥 CLIENTES
            </button>
            <button class="tab-button" id="tab-finanzas" onclick="switchTab('finanzas')">
                📊 FINANZAS
            </button>
        </div>

        <div id="view-clientes" class="section-view active">
            <div class="section-header">
                <h2>Mis Clientes</h2>
                <div style="display:flex; gap:10px;">
                    <button class="btn-action-small" onclick="exportarAExcel()">📥 Exportar</button>
